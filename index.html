<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ক্লাস নাইন রেজিস্ট্রেশন ব্যবস্থাপনা</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 20px; border: 1px solid #ddd; }
        .school-header { text-align: center; margin-bottom: 25px; }
        .school-header h1 { font-size: 26px; color: #333; }
        .school-header h2 { font-size: 19px; color: #555; }

        .form-section { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 8px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-row-2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; font-size: 15px; border-radius: 4px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 15px; }
        button:hover { background: #555; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th { background: #f0f0f0; padding: 12px; text-align: left; border: 1px solid #ddd; font-weight: bold; }
        table td { padding: 12px; border: 1px solid #ddd; vertical-align: middle; }

        .status-yes { background-color: #d4edda; color: #155724; font-weight: bold; text-align: center; }
        .status-no { background-color: #f8d7da; color: #721c24; font-weight: bold; text-align: center; }
        .status-bad { background-color: #f8d7da; color: #721c24; font-weight: bold; }
        .status-done { background-color: #d4edda; color: #155724; font-weight: bold; }

        .search-box { margin: 15px 0; }
        .search-box input { padding: 12px; width: 400px; font-size: 16px; }

        .action-buttons button { padding: 6px 12px; font-size: 13px; margin-right: 5px; }
        .no-print { display: block; }

        @media print {
            .no-print { display: none !important; }
            table td, table th { border: 1px solid #000; color: black; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="school-header">
            <h1>ফতুল্লা পাইলট উচ্চ বিদ্যালয়</h1>
            <h2>ক্লাস নাইন - রেজিস্ট্রেশন কার্ড বিতরণ ও ব্যবস্থাপনা (২০২৬)</h2>
        </div>

        <!-- ফর্ম -->
        <div class="form-section no-print">
            <div class="form-row">
                <div><input type="text" id="roll" placeholder="রোল নং *"></div>
                <div><input type="text" id="studentName" placeholder="শিক্ষার্থীর নাম *"></div>
                <div>
                    <select id="section">
                        <option value="">শাখা নির্বাচন করুন *</option>
                        <option value="Female-A">Female - A</option>
                        <option value="Female-B">Female - B</option>
                        <option value="Female-C">Female - C</option>
                        <option value="Male-A">Male - A</option>
                        <option value="Male-B">Male - B</option>
                        <option value="Male-C">Male - C</option>
                    </select>
                </div>
                <div><input type="text" id="fatherName" placeholder="পিতার নাম"></div>
            </div>

            <div class="form-row-2">
                <div>
                    <label>রেজিস্ট্রেশন স্ট্যাটাস</label>
                    <select id="regStatus">
                        <option value="bad">বাদ পড়েছে</option>
                        <option value="done">সম্পন্ন হয়েছে</option>
                    </select>
                </div>
                <div>
                    <label>রেজিস্ট্রেশন কার্ড জমা</label>
                    <select id="cardStatus">
                        <option value="no">না</option>
                        <option value="yes">হ্যাঁ</option>
                    </select>
                </div>
                <div>
                    <label>ফর্ম জমা</label>
                    <select id="formStatus">
                        <option value="no">না</option>
                        <option value="yes">হ্যাঁ</option>
                    </select>
                </div>
                <div>
                    <label>ডকুমেন্ট জমা</label>
                    <select id="docStatus">
                        <option value="no">না</option>
                        <option value="yes">হ্যাঁ</option>
                    </select>
                </div>
            </div>

            <div style="margin-top:15px;">
                <textarea id="comment" placeholder="মন্তব্য (যেমন: ৮ম শ্রেণির কার্ড জমা দেয়নি, পরে জমা দিবে ইত্যাদি)" rows="2"></textarea>
            </div>

            <div>
                <button onclick="saveData()">সংরক্ষণ করুন</button>
                <button id="cancelBtn" onclick="cancelEdit()" style="background:#999; display:none; margin-left:10px;">বাতিল</button>
            </div>
        </div>

        <!-- সার্চ -->
        <div class="search-box no-print">
            <input type="text" id="searchInput" placeholder="রোল, নাম, শাখা, মন্তব্য দিয়ে সার্চ করুন..." oninput="searchData()">
        </div>

        <button class="no-print" onclick="printTable()" style="margin-bottom:15px; padding:10px 25px;">📄 পুরো তালিকা প্রিন্ট করুন</button>

        <!-- তালিকা -->
        <div id="dataList"></div>
    </div>

    <script>
        let dataList = [];
        let editingId = null;

        function loadData() {
            const saved = localStorage.getItem('class9Registration2026');
            if (saved) dataList = JSON.parse(saved);
            displayData();
        }

        function saveToLocalStorage() {
            localStorage.setItem('class9Registration2026', JSON.stringify(dataList));
        }

        function saveData() {
            const roll = document.getElementById('roll').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            const section = document.getElementById('section').value;
            const fatherName = document.getElementById('fatherName').value.trim();

            const regStatus = document.getElementById('regStatus').value;
            const cardStatus = document.getElementById('cardStatus').value;
            const formStatus = document.getElementById('formStatus').value;
            const docStatus = document.getElementById('docStatus').value;
            const comment = document.getElementById('comment').value.trim();

            if (!roll || !studentName || !section) {
                alert('রোল নং, শিক্ষার্থীর নাম এবং শাখা পূরণ করুন!');
                return;
            }

            const data = {
                id: editingId || Date.now(),
                roll, studentName, section, fatherName,
                regStatus, cardStatus, formStatus, docStatus,
                comment
            };

            if (editingId) {
                const index = dataList.findIndex(i => i.id === editingId);
                dataList[index] = data;
                editingId = null;
            } else {
                dataList.push(data);
            }

            saveToLocalStorage();
            clearForm();
            displayData();
        }

        function clearForm() {
            document.getElementById('roll').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('section').value = '';
            document.getElementById('fatherName').value = '';
            document.getElementById('regStatus').value = 'bad';
            document.getElementById('cardStatus').value = 'no';
            document.getElementById('formStatus').value = 'no';
            document.getElementById('docStatus').value = 'no';
            document.getElementById('comment').value = '';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function editData(id) {
            const data = dataList.find(i => i.id === id);
            if (data) {
                document.getElementById('roll').value = data.roll;
                document.getElementById('studentName').value = data.studentName;
                document.getElementById('section').value = data.section;
                document.getElementById('fatherName').value = data.fatherName || '';
                document.getElementById('regStatus').value = data.regStatus;
                document.getElementById('cardStatus').value = data.cardStatus;
                document.getElementById('formStatus').value = data.formStatus;
                document.getElementById('docStatus').value = data.docStatus;
                document.getElementById('comment').value = data.comment || '';
                document.getElementById('cancelBtn').style.display = 'inline-block';
                editingId = id;
            }
        }

        function deleteData(id) {
            if (confirm('এই শিক্ষার্থীর তথ্য মুছে ফেলবেন?')) {
                dataList = dataList.filter(i => i.id !== id);
                saveToLocalStorage();
                displayData();
            }
        }

        function displayData(filtered = null) {
            const listElement = document.getElementById('dataList');
            const displayList = filtered || dataList;

            let html = `<table>
                <thead>
                    <tr>
                        <th>রোল</th>
                        <th>শিক্ষার্থীর নাম</th>
                        <th>শাখা</th>
                        <th>পিতার নাম</th>
                        <th>রেজিস্ট্রেশন স্ট্যাটাস</th>
                        <th>কার্ড জমা</th>
                        <th>ফর্ম জমা</th>
                        <th>ডকুমেন্ট জমা</th>
                        <th>মন্তব্য</th>
                        <th class="no-print">কার্যক্রম</th>
                    </tr>
                </thead>
                <tbody>`;

            displayList.forEach(data => {
                const regClass = data.regStatus === 'done' ? 'status-done' : 'status-bad';
                const regText = data.regStatus === 'done' ? 'সম্পন্ন' : 'বাদ পড়েছে';

                const cardClass = data.cardStatus === 'yes' ? 'status-yes' : 'status-no';
                const formClass = data.formStatus === 'yes' ? 'status-yes' : 'status-no';
                const docClass = data.docStatus === 'yes' ? 'status-yes' : 'status-no';

                html += `<tr>
                    <td><strong>${data.roll}</strong></td>
                    <td>${data.studentName}</td>
                    <td>${data.section}</td>
                    <td>${data.fatherName || '-'}</td>
                    <td class="${regClass}">${regText}</td>
                    <td class="${cardClass}">${data.cardStatus === 'yes' ? 'হ্যাঁ' : 'না'}</td>
                    <td class="${formClass}">${data.formStatus === 'yes' ? 'হ্যাঁ' : 'না'}</td>
                    <td class="${docClass}">${data.docStatus === 'yes' ? 'হ্যাঁ' : 'না'}</td>
                    <td>${data.comment || '-'}</td>
                    <td class="no-print action-buttons">
                        <button onclick="editData(${data.id})">সম্পাদনা</button>
                        <button onclick="deleteData(${data.id})" style="background:#c00;color:white;">মুছুন</button>
                    </td>
                </tr>`;
            });

            html += `</tbody></table>`;
            listElement.innerHTML = displayList.length ? html : '<p style="text-align:center; color:#999; padding:40px; font-size:18px;">কোন তথ্য পাওয়া যায়নি</p>';
        }

        function searchData() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = dataList.filter(d => 
                (d.roll && d.roll.toLowerCase().includes(term)) ||
                (d.studentName && d.studentName.toLowerCase().includes(term)) ||
                (d.section && d.section.toLowerCase().includes(term)) ||
                (d.fatherName && d.fatherName.toLowerCase().includes(term)) ||
                (d.comment && d.comment.toLowerCase().includes(term))
            );
            displayData(filtered);
        }

        function printTable() {
            window.print();
        }

        function cancelEdit() {
            clearForm();
        }

        // লোড করুন
        loadData();
    </script>
</body>
</html>
