<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ক্লাস নাইন রেজিস্ট্রেশন - সহজ ব্যবস্থা</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }

        .school-header { text-align: center; margin-bottom: 30px; }
        .school-header h1 { font-size: 28px; color: #1e3a8a; }
        .school-header h2 { font-size: 21px; color: #334155; }

        .section-group {
            margin-bottom: 35px;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .section-header {
            background: #1e40af;
            color: white;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .add-btn:hover { background: #16a34a; }

        .student-row {
            display: grid;
            grid-template-columns: 80px 1fr 1fr 120px 160px 100px 50px;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
            background: #fafafa;
        }

        .student-row:last-child { border-bottom: none; }

        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .status-select {
            font-weight: bold;
        }

        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .no-print { display: block; }

        @media print {
            .no-print { display: none !important; }
            .student-row { background: white !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="school-header">
            <h1>ফতুল্লা পাইলট উচ্চ বিদ্যালয়</h1>
            <h2>ক্লাস নাইন - রেজিস্ট্রেশন ব্যবস্থাপনা (২০২৬)</h2>
        </div>

        <div id="sectionsContainer"></div>

        <div class="no-print" style="text-align: center; margin-top: 30px;">
            <button onclick="printPage()" style="padding: 12px 40px; font-size: 17px; background: #1e40af;">
                📄 পুরো তালিকা প্রিন্ট করুন
            </button>
        </div>
    </div>

    <script>
        const branches = [
            { name: "Female - A", gender: "female" },
            { name: "Female - B", gender: "female" },
            { name: "Female - C", gender: "female" },
            { name: "Male - A", gender: "male" },
            { name: "Male - B", gender: "male" },
            { name: "Male - C", gender: "male" }
        ];

        let allData = {}; // { "Female-A": [{roll, name, father, status, comment}, ...] }

        function loadData() {
            const saved = localStorage.getItem('class9Registration2026_easy');
            if (saved) allData = JSON.parse(saved);
            renderAllSections();
        }

        function saveData() {
            localStorage.setItem('class9Registration2026_easy', JSON.stringify(allData));
        }

        function renderAllSections() {
            const container = document.getElementById('sectionsContainer');
            let html = '';

            branches.forEach(branch => {
                const students = allData[branch.name] || [];
                
                let studentRows = '';
                students.forEach((student, index) => {
                    studentRows += `
                        <div class="student-row">
                            <input type="text" value="${student.roll || ''}" placeholder="রোল" 
                                   onchange="updateStudent('${branch.name}', ${index}, 'roll', this.value)">
                            <input type="text" value="${student.name || ''}" placeholder="শিক্ষার্থীর নাম" 
                                   onchange="updateStudent('${branch.name}', ${index}, 'name', this.value)">
                            <input type="text" value="${student.father || ''}" placeholder="পিতার নাম" 
                                   onchange="updateStudent('${branch.name}', ${index}, 'father', this.value)">
                            <select onchange="updateStudent('${branch.name}', ${index}, 'status', this.value)" class="status-select">
                                <option value="reg-no" ${student.status === 'reg-no' ? 'selected' : ''}>রেজি পাইনি</option>
                                <option value="reg-yes" ${student.status === 'reg-yes' ? 'selected' : ''}>রেজি পেয়েছি</option>
                                <option value="form-no" ${student.status === 'form-no' ? 'selected' : ''}>ফর্ম পাইনি</option>
                                <option value="form-yes" ${student.status === 'form-yes' ? 'selected' : ''}>ফর্ম পেয়েছি</option>
                            </select>
                            <input type="text" value="${student.comment || ''}" placeholder="মন্তব্য (ঐচ্ছিক)" 
                                   onchange="updateStudent('${branch.name}', ${index}, 'comment', this.value)">
                            <button class="remove-btn" onclick="removeStudent('${branch.name}', ${index})">−</button>
                        </div>`;
                });

                html += `
                    <div class="section-group">
                        <div class="section-header">
                            <span>${branch.name}</span>
                            <button class="add-btn" onclick="addStudent('${branch.name}')">+ নতুন শিক্ষার্থী যোগ করুন</button>
                        </div>
                        ${studentRows}
                    </div>`;
            });

            container.innerHTML = html;
        }

        function addStudent(branch) {
            if (!allData[branch]) allData[branch] = [];
            
            allData[branch].push({
                roll: '',
                name: '',
                father: '',
                status: 'reg-no',   // ডিফল্ট: রেজিস্ট্রেশন পাইনি
                comment: ''
            });

            saveData();
            renderAllSections();
        }

        function updateStudent(branch, index, field, value) {
            if (!allData[branch]) return;
            allData[branch][index][field] = value;
            saveData();
        }

        function removeStudent(branch, index) {
            if (confirm('এই শিক্ষার্থীকে মুছে ফেলবেন?')) {
                if (allData[branch]) {
                    allData[branch].splice(index, 1);
                    saveData();
                    renderAllSections();
                }
            }
        }

        function printPage() {
            window.print();
        }

        // লোড করুন
        window.onload = loadData;
    </script>
</body>
</html>
