<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ক্লাস নাইন রেজিস্ট্রেশন - সহজ ব্যবস্থা</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #f4f6f9; 
            padding: 15px; 
        }
        .container { 
            max-width: 1450px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.1); 
        }

        .school-header { 
            text-align: center; 
            margin-bottom: 20px; 
        }
        .school-header h1 { font-size: 26px; color: #1e3a8a; }
        .school-header h2 { font-size: 18px; color: #334155; }

        /* সার্চ এরিয়া */
        .search-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            position: sticky;
            top: 10px;
            z-index: 100;
            background: white;
            padding: 10px 0;
        }
        .search-box {
            flex: 1;
            min-width: 280px;
        }
        .search-box input, .search-box select {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
        }
        .search-box input:focus, .search-box select:focus {
            border-color: #3b82f6;
            outline: none;
        }

        /* সারাংশ */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: #f8fafc;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .big-number {
            font-size: 28px;
            font-weight: bold;
        }

        .section-group {
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .section-header {
            background: #1e40af;
            color: white;
            padding: 14px 20px;
            font-size: 17px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-branch-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        /* স্টুডেন্ট রো */
        .student-row {
            display: grid;
            grid-template-columns: 85px 1fr 1fr 135px 160px 80px;
            gap: 10px;
            padding: 15px 18px;
            border-bottom: 1px solid #eee;
            align-items: center;
            background: #fafcff;
        }
        .student-row:last-child { border-bottom: none; }

        input, select {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            width: 100%;
        }

        .status-reg-no { background: #fee2e2; color: #991b1b; font-weight: bold; }
        .status-reg-yes { background: #dcfce7; color: #166534; font-weight: bold; }
        .status-form-no { background: #fee2e2; color: #991b1b; font-weight: bold; }
        .status-form-yes { background: #dbeafe; color: #1e40af; font-weight: bold; }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .add-row-btn { background: #22c55e; color: white; }
        .remove-btn { background: #ef4444; color: white; }

        .no-data {
            padding: 40px 20px;
            text-align: center;
            color: #777;
            font-size: 16px;
        }

        .backup-buttons {
            margin: 25px 0;
            text-align: center;
        }
        .backup-buttons button {
            padding: 12px 24px;
            margin: 0 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }
        .export-btn { background: #16a34a; }
        .import-btn { background: #3b82f6; }

        @media (max-width: 768px) {
            .student-row {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 16px;
            }
            .search-area {
                flex-direction: column;
            }
        }

        @media print {
            .no-print, .search-area, .backup-buttons { display: none !important; }
            .student-row { grid-template-columns: 80px 1fr 1fr 120px 140px; }
            input, select { border: none; background: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="school-header">
            <h1>ফতুল্লা পাইলট উচ্চ বিদ্যালয়</h1>
            <h2>ক্লাস নাইন - রেজিস্ট্রেশন ব্যবস্থাপনা (২০২৬)</h2>
        </div>

        <!-- সার্চ এরিয়া -->
        <div class="search-area no-print">
            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="রোল, নাম, মোবাইল বা মন্তব্য দিয়ে সার্চ করুন..." onkeyup="filterData()">
            </div>
            <div class="search-box">
                <select id="branchFilter" onchange="filterData()">
                    <option value="">সব শাখা দেখান</option>
                    <option value="Female - A">Female - A</option>
                    <option value="Female - B">Female - B</option>
                    <option value="Female - C">Female - C</option>
                    <option value="Male - A">Male - A</option>
                    <option value="Male - B">Male - B</option>
                    <option value="Male - C">Male - C</option>
                </select>
            </div>
        </div>

        <!-- সারাংশ -->
        <div id="summary" class="summary no-print"></div>

        <div id="sectionsContainer"></div>

        <!-- Backup Buttons -->
        <div class="backup-buttons no-print">
            <button class="export-btn" onclick="exportData()">📤 Export Data (ডাউনলোড)</button>
            <button class="import-btn" onclick="document.getElementById('importFile').click()">📥 Import Data (আপলোড)</button>
            <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
        </div>

        <div class="no-print" style="text-align: center; margin: 20px 0;">
            <button onclick="printPage()" style="padding: 14px 45px; font-size: 17px; background: #1e40af; color: white; border: none; border-radius: 8px;">
                📄 পুরো তালিকা প্রিন্ট করুন
            </button>
        </div>
    </div>

    <script>
        const branches = ["Female - A", "Female - B", "Female - C", "Male - A", "Male - B", "Male - C"];
        let allData = {};

        function loadData() {
            const saved = localStorage.getItem('class9Reg2026_colored');
            if (saved) allData = JSON.parse(saved);
            renderAll();
        }

        function saveData() {
            localStorage.setItem('class9Reg2026_colored', JSON.stringify(allData));
        }

        function renderSummary() {
            let total = 0, regYes = 0, regNo = 0, formYes = 0;

            Object.values(allData).forEach(list => {
                total += list.length;
                list.forEach(s => {
                    if (s.status === 'reg-yes') regYes++;
                    else regNo++;
                    if (s.status === 'form-yes') formYes++;
                });
            });

            document.getElementById('summary').innerHTML = `
                <div class="summary-card"><h3>মোট এন্ট্রি</h3><div class="big-number" style="color:#1e40af">${total}</div></div>
                <div class="summary-card"><h3>রেজি পেয়েছে</h3><div class="big-number" style="color:#166534">${regYes}</div></div>
                <div class="summary-card"><h3>রেজি পায়নি</h3><div class="big-number" style="color:#991b1b">${regNo}</div></div>
                <div class="summary-card"><h3>ফর্ম পেয়েছে</h3><div class="big-number" style="color:#1e40af">${formYes}</div></div>
            `;
        }

        function renderSections(searchTerm = '', selectedBranch = '') {
            const container = document.getElementById('sectionsContainer');
            let html = '';

            branches.forEach(branch => {
                if (selectedBranch && selectedBranch !== branch) return;

                let students = allData[branch] || [];

                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    students = students.filter(s => 
                        (s.roll && s.roll.toLowerCase().includes(term)) ||
                        (s.name && s.name.toLowerCase().includes(term)) ||
                        (s.number && s.number.includes(term)) ||
                        (s.comment && s.comment.toLowerCase().includes(term))
                    );
                }

                let rows = '';
                students.forEach((student, index) => {
                    const statusClass = 
                        student.status === 'reg-yes' ? 'status-reg-yes' :
                        student.status === 'form-yes' ? 'status-form-yes' :
                        'status-reg-no';

                    rows += `
                        <div class="student-row">
                            <input type="text" value="${student.roll || ''}" placeholder="রোল" onchange="updateStudent('${branch}', ${index}, 'roll', this.value)">
                            <input type="text" value="${student.name || ''}" placeholder="শিক্ষার্থীর নাম" onchange="updateStudent('${branch}', ${index}, 'name', this.value)">
                            <input type="text" value="${student.number || ''}" placeholder="মোবাইল নাম্বার" onchange="updateStudent('${branch}', ${index}, 'number', this.value)">
                            <select onchange="updateStudent('${branch}', ${index}, 'status', this.value)" class="status-select ${statusClass}">
                                <option value="reg-no" ${student.status === 'reg-no' ? 'selected' : ''}>রেজি পাইনি</option>
                                <option value="reg-yes" ${student.status === 'reg-yes' ? 'selected' : ''}>রেজি পেয়েছি</option>
                                <option value="form-no" ${student.status === 'form-no' ? 'selected' : ''}>ফর্ম পাইনি</option>
                                <option value="form-yes" ${student.status === 'form-yes' ? 'selected' : ''}>ফর্ম পেয়েছি</option>
                            </select>
                            <input type="text" value="${student.comment || ''}" placeholder="মন্তব্য" onchange="updateStudent('${branch}', ${index}, 'comment', this.value)">
                            <div style="display:flex; gap:6px;">
                                <button class="action-btn add-row-btn" onclick="addStudentAfter('${branch}', ${index})" title="এই শিক্ষার্থীর পরে যোগ করুন">+</button>
                                <button class="action-btn remove-btn" onclick="removeStudent('${branch}', ${index})" title="মুছুন">−</button>
                            </div>
                        </div>`;
                });

                html += `
                    <div class="section-group">
                        <div class="section-header">
                            <span>${branch} (${students.length})</span>
                            <button class="add-branch-btn" onclick="addStudent('${branch}')">
                                ➕ নতুন শিক্ষার্থী যোগ করুন
                            </button>
                        </div>
                        ${rows || '<div class="no-data">এই শাখায় কোনো তথ্য নেই</div>'}
                    </div>`;
            });

            container.innerHTML = html || '<div class="no-data">কোনো তথ্য পাওয়া যায়নি</div>';
        }

        function filterData() {
            const searchTerm = document.getElementById('globalSearch').value.trim();
            const selectedBranch = document.getElementById('branchFilter').value;
            renderSections(searchTerm, selectedBranch);
        }

        function addStudent(branch) {
            if (!allData[branch]) allData[branch] = [];
            allData[branch].push({ roll: '', name: '', number: '', status: 'reg-no', comment: '' });
            saveData();
            renderAll();
        }

        function addStudentAfter(branch, index) {
            if (!allData[branch]) allData[branch] = [];
            allData[branch].splice(index + 1, 0, {
                roll: '', name: '', number: '', status: 'reg-no', comment: ''
            });
            saveData();
            renderAll();
        }

        function updateStudent(branch, index, field, value) {
            if (allData[branch] && allData[branch][index]) {
                allData[branch][index][field] = value;
                saveData();
                renderSummary();
            }
        }

        function removeStudent(branch, index) {
            if (confirm('এই শিক্ষার্থীর তথ্য মুছে ফেলবেন?')) {
                allData[branch].splice(index, 1);
                if (allData[branch].length === 0) delete allData[branch];
                saveData();
                renderAll();
            }
        }

        function printPage() {
            window.print();
        }

        function renderAll() {
            renderSummary();
            renderSections();
        }

        // Export & Import
        function exportData() {
            const dataStr = JSON.stringify(allData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `class9_registration_backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            alert('✅ ডাটা সফলভাবে ডাউনলোড হয়েছে!');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (confirm('বর্তমান ডাটা ওভাররাইট হয়ে যাবে। Import করবেন?')) {
                        allData = importedData;
                        saveData();
                        renderAll();
                        alert('✅ ডাটা সফলভাবে Import হয়েছে!');
                    }
                } catch (err) {
                    alert('❌ ফাইলটি সঠিক নয়।');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        window.onload = loadData;
    </script>
</body>
</html>
