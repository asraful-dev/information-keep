<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ক্লাস নাইন রেজিস্ট্রেশন ব্যবস্থাপনা</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .school-header { text-align: center; margin-bottom: 30px; }
        .school-header h1 { font-size: 28px; color: #1e3a8a; }
        .school-header h2 { font-size: 20px; color: #334155; }

        .form-section { 
            background: #f8fafc; 
            padding: 25px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 25px; 
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr 1fr; 
            gap: 18px; 
            margin-bottom: 20px; 
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 15px; 
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            outline: none;
        }

        button { 
            padding: 12px 25px; 
            background: #1e40af; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 15px; 
        }
        button:hover { background: #1e3a8a; }

        .btn-cancel { background: #64748b; }
        .btn-cancel:hover { background: #475569; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th { 
            background: #1e3a8a; 
            color: white; 
            padding: 14px; 
            text-align: left; 
        }
        table td { 
            padding: 12px; 
            border-bottom: 1px solid #ddd; 
        }

        .status-no { background-color: #fee2e2; color: #991b1b; font-weight: bold; text-align: center; }
        .status-reg-yes { background-color: #dcfce7; color: #166534; font-weight: bold; text-align: center; }
        .status-form-yes { background-color: #dbeafe; color: #1e40af; font-weight: bold; text-align: center; }

        .search-box input { 
            width: 450px; 
            padding: 14px; 
            font-size: 16px; 
            margin: 15px 0; 
        }

        .no-print { display: block; }

        @media print {
            .no-print { display: none !important; }
            table th, table td { border: 1px solid #000; color: black; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="school-header">
            <h1>ফতুল্লা পাইলট উচ্চ বিদ্যালয়</h1>
            <h2>ক্লাস নাইন - রেজিস্ট্রেশন ব্যবস্থাপনা (২০২৬)</h2>
        </div>

        <!-- ফর্ম (সহজ করা হয়েছে) -->
        <div class="form-section no-print">
            <div class="form-row">
                <div>
                    <label>শাখা <span style="color:red;">*</span></label>
                    <select id="section">
                        <option value="">শাখা নির্বাচন করুন</option>
                        <option value="Female-A">Female - A</option>
                        <option value="Female-B">Female - B</option>
                        <option value="Female-C">Female - C</option>
                        <option value="Male-A">Male - A</option>
                        <option value="Male-B">Male - B</option>
                        <option value="Male-C">Male - C</option>
                    </select>
                </div>
                <div>
                    <label>রোল নং <span style="color:red;">*</span></label>
                    <input type="text" id="roll" placeholder="রোল নং">
                </div>
                <div>
                    <label>শিক্ষার্থীর নাম <span style="color:red;">*</span></label>
                    <input type="text" id="studentName" placeholder="শিক্ষার্থীর নাম">
                </div>
                <div>
                    <label>পিতার নাম</label>
                    <input type="text" id="fatherName" placeholder="পিতার নাম (ঐচ্ছিক)">
                </div>
            </div>

            <div class="form-row">
                <div>
                    <label>রেজিস্ট্রেশন স্ট্যাটাস</label>
                    <select id="regStatus">
                        <option value="reg-no">রেজিস্ট্রেশন পাইনি</option>
                        <option value="reg-yes">রেজিস্ট্রেশন পেয়েছি</option>
                        <option value="form-no">ফর্ম পাইনি</option>
                        <option value="form-yes">ফর্ম পেয়েছি</option>
                    </select>
                </div>
                <div>
                    <label>মন্তব্য</label>
                    <select id="commentType" onchange="toggleCommentBox()">
                        <option value="">মন্তব্য নেই</option>
                        <option value="custom">মন্তব্য লিখুন</option>
                        <option value="8th_card">৮ম শ্রেণির কার্ড জমা দেয়নি</option>
                        <option value="later">পরে জমা দিবে</option>
                        <option value="absent">অনুপস্থিত</option>
                    </select>
                </div>
            </div>

            <div id="commentBox" style="display: none; margin-top: 15px;">
                <label>বিস্তারিত মন্তব্য</label>
                <textarea id="comment" rows="2" placeholder="মন্তব্য লিখুন..."></textarea>
            </div>

            <div style="margin-top: 20px;">
                <button onclick="saveData()">✅ সংরক্ষণ করুন</button>
                <button id="cancelBtn" onclick="cancelEdit()" class="btn-cancel" style="display:none; margin-left: 15px;">বাতিল</button>
            </div>
        </div>

        <!-- সার্চ -->
        <div class="search-box no-print">
            <input type="text" id="searchInput" placeholder="রোল, নাম, শাখা বা মন্তব্য দিয়ে সার্চ করুন..." oninput="searchData()">
        </div>

        <button class="no-print" onclick="printTable()" style="margin-bottom:15px; padding:12px 30px;">📄 পুরো তালিকা প্রিন্ট করুন</button>

        <!-- তালিকা -->
        <div id="dataList"></div>
    </div>

    <script>
        let dataList = [];
        let editingId = null;

        function loadData() {
            const saved = localStorage.getItem('class9Reg2026_simple');
            if (saved) dataList = JSON.parse(saved);
            displayData();
        }

        function saveToLocalStorage() {
            localStorage.setItem('class9Reg2026_simple', JSON.stringify(dataList));
        }

        function toggleCommentBox() {
            const type = document.getElementById('commentType').value;
            document.getElementById('commentBox').style.display = (type === 'custom') ? 'block' : 'none';
        }

        function saveData() {
            const section = document.getElementById('section').value;
            const roll = document.getElementById('roll').value.trim();
            const studentName = document.getElementById('studentName').value.trim();

            if (!section || !roll || !studentName) {
                alert('শাখা, রোল নং এবং শিক্ষার্থীর নাম পূরণ করা আবশ্যক!');
                return;
            }

            const fatherName = document.getElementById('fatherName').value.trim();
            const regStatus = document.getElementById('regStatus').value;
            let comment = '';

            const commentType = document.getElementById('commentType').value;
            if (commentType === 'custom') {
                comment = document.getElementById('comment').value.trim();
            } else if (commentType !== '') {
                if (commentType === '8th_card') comment = '৮ম শ্রেণির কার্ড জমা দেয়নি';
                else if (commentType === 'later') comment = 'পরে জমা দিবে';
                else if (commentType === 'absent') comment = 'অনুপস্থিত';
            }

            const data = {
                id: editingId || Date.now(),
                section,
                roll,
                studentName,
                fatherName,
                regStatus,
                comment
            };

            if (editingId) {
                const index = dataList.findIndex(item => item.id === editingId);
                dataList[index] = data;
                editingId = null;
            } else {
                dataList.push(data);
            }

            saveToLocalStorage();
            clearForm();
            displayData();
        }

        function clearForm() {
            document.getElementById('section').value = '';
            document.getElementById('roll').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('fatherName').value = '';
            document.getElementById('regStatus').value = 'reg-no';
            document.getElementById('commentType').value = '';
            document.getElementById('comment').value = '';
            document.getElementById('commentBox').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function editData(id) {
            const item = dataList.find(i => i.id === id);
            if (item) {
                document.getElementById('section').value = item.section;
                document.getElementById('roll').value = item.roll;
                document.getElementById('studentName').value = item.studentName;
                document.getElementById('fatherName').value = item.fatherName || '';
                document.getElementById('regStatus').value = item.regStatus;
                
                // মন্তব্য হ্যান্ডেল
                document.getElementById('comment').value = item.comment || '';
                if (item.comment) {
                    document.getElementById('commentType').value = 'custom';
                    document.getElementById('commentBox').style.display = 'block';
                } else {
                    document.getElementById('commentType').value = '';
                    document.getElementById('commentBox').style.display = 'none';
                }

                document.getElementById('cancelBtn').style.display = 'inline-block';
                editingId = id;
            }
        }

        function deleteData(id) {
            if (confirm('এই তথ্য মুছে ফেলবেন?')) {
                dataList = dataList.filter(i => i.id !== id);
                saveToLocalStorage();
                displayData();
            }
        }

        function getStatusTextAndClass(status) {
            switch(status) {
                case 'reg-yes': return { text: 'রেজিস্ট্রেশন পেয়েছি', class: 'status-reg-yes' };
                case 'form-yes': return { text: 'ফর্ম পেয়েছি', class: 'status-form-yes' };
                case 'form-no': return { text: 'ফর্ম পাইনি', class: 'status-no' };
                default: return { text: 'রেজিস্ট্রেশন পাইনি', class: 'status-no' };
            }
        }

        function displayData(filtered = null) {
            const container = document.getElementById('dataList');
            const list = filtered || dataList;

            // শাখা → রোল অনুসারে সর্ট
            list.sort((a, b) => {
                if (a.section !== b.section) return a.section.localeCompare(b.section);
                return parseInt(a.roll) - parseInt(b.roll);
            });

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>শাখা</th>
                            <th>রোল</th>
                            <th>শিক্ষার্থীর নাম</th>
                            <th>পিতার নাম</th>
                            <th>রেজিস্ট্রেশন স্ট্যাটাস</th>
                            <th>মন্তব্য</th>
                            <th class="no-print">কার্যক্রম</th>
                        </tr>
                    </thead>
                    <tbody>`;

            list.forEach(item => {
                const status = getStatusTextAndClass(item.regStatus);
                html += `
                    <tr>
                        <td><strong>${item.section}</strong></td>
                        <td><strong>${item.roll}</strong></td>
                        <td>${item.studentName}</td>
                        <td>${item.fatherName || '-'}</td>
                        <td class="${status.class}">${status.text}</td>
                        <td>${item.comment || '-'}</td>
                        <td class="no-print">
                            <button onclick="editData(${item.id})" style="background:#2563eb; margin-right:5px;">সম্পাদনা</button>
                            <button onclick="deleteData(${item.id})" style="background:#ef4444; color:white;">মুছুন</button>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table>`;

            container.innerHTML = list.length ? html : '<p style="text-align:center; padding:50px; color:#666;">কোনো তথ্য পাওয়া যায়নি</p>';
        }

        function searchData() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = dataList.filter(item =>
                item.roll.toLowerCase().includes(term) ||
                item.studentName.toLowerCase().includes(term) ||
                item.section.toLowerCase().includes(term) ||
                (item.fatherName && item.fatherName.toLowerCase().includes(term)) ||
                (item.comment && item.comment.toLowerCase().includes(term))
            );
            displayData(filtered);
        }

        function printTable() {
            window.print();
        }

        function cancelEdit() {
            clearForm();
        }

        // লোড
        window.onload = loadData;
    </script>
</body>
</html>
